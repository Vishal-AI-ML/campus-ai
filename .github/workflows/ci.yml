name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (incl. dev)
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests (pytest on throwaway SQLite)
        run: uv run pytest
