<style>
:root{--acc:#6366f1;--acc2:#8b5cf6}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:#020617;-webkit-font-smoothing:antialiased;overflow:hidden}
#tourRoot{position:fixed;inset:0;display:flex;--abg:#020617;--panel:rgba(255,255,255,.05);--bd:rgba(255,255,255,.10);--tx:#e2e8f0;--mut:#94a3b8;--side:#0b1220;--chrome:#0b1220;--sideactive:rgba(99,102,241,.20)}
#tourRoot[data-theme="light"]{--abg:#f6f8fc;--panel:#ffffff;--bd:#e6ebf2;--tx:#0f172a;--mut:#64748b;--side:#ffffff;--chrome:#eef2f7;--sideactive:#eef0ff}
.muted{color:var(--mut)}
.frame{position:relative;flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--abg)}
.frametop{height:38px;background:var(--chrome);display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid var(--bd);flex:none}
.dots{display:flex;gap:6px}
.dots i{width:11px;height:11px;border-radius:50%;display:block}
.d1{background:#ff5f57}.d2{background:#febc2e}.d3{background:#28c840}
.url{flex:1;text-align:center;font-size:12px;color:var(--mut)}
.app{flex:1;display:flex;min-height:0}
.side{width:232px;flex:none;background:var(--side);border-right:1px solid var(--bd);padding:14px 12px;overflow-y:auto}
.sbrand{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--tx);padding:4px 8px 10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;display:grid;place-items:center;font-weight:800}
.snav{display:flex;flex-direction:column;gap:2px}
.sitem{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:9px;font-size:13.5px;color:var(--mut);cursor:pointer}
.sitem:hover{background:var(--sideactive);color:var(--tx)}
.sitem.on{background:var(--sideactive);color:var(--tx);font-weight:600}
.sitem .em{width:18px;text-align:center}
.suser{margin-top:14px;padding:12px 8px 4px;border-top:1px solid var(--bd);font-size:12px;color:var(--mut);line-height:1.5}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.apptop{height:56px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--bd)}
.apptop .title{font-weight:700;color:var(--tx);font-size:15px}
.demoflag{margin-left:12px;font-size:11px;font-weight:600;color:var(--mut);background:var(--panel);border:1px solid var(--bd);padding:3px 10px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.apptop .right{display:flex;align-items:center;gap:12px}
.selrole{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 10px;font-size:13px;outline:none}
.tbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--panel);color:var(--tx);cursor:pointer;font-size:15px}
.rolepill{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:999px;padding:5px 12px;font-size:12px}
.bell{position:relative;font-size:16px;color:var(--mut);cursor:default}
.bell b{position:absolute;top:-7px;right:-8px;background:#ef4444;color:#fff;font-size:9px;border-radius:999px;padding:1px 4px}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
.screen{flex:1;overflow-y:auto;padding:24px 24px 104px}
.sh{font-size:20px;font-weight:700;color:var(--tx)}
.ssub{margin:4px 0 18px;font-size:13.5px;color:var(--mut);line-height:1.5}
.fade{animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat2{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:15px}
.stat2 .v{font-size:23px;font-weight:800}
.stat2 .l{margin-top:4px;font-size:12px;color:var(--mut)}
.c-emerald{color:#34d399}.c-indigo{color:#818cf8}.c-violet{color:#a78bfa}.c-amber{color:#fbbf24}.c-sky{color:#38bdf8}.c-pink{color:#f472b6}.c-white{color:var(--tx)}
.panel{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:16px}
.panel .pt{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:12px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--mut);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:0 10px 8px}
table.tbl td{padding:9px 10px;border-top:1px solid var(--bd);color:var(--tx)}
.chip{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:600}
.chip-ok{background:rgba(16,185,129,.16);color:#34d399}
.chip-warn{background:rgba(245,158,11,.16);color:#fbbf24}
.chip-bad{background:rgba(239,68,68,.16);color:#f87171}
.chip-info{background:rgba(99,102,241,.16);color:#818cf8}
.chip-neutral{background:rgba(148,163,184,.16);color:var(--mut)}
#tourRoot[data-theme="light"] .chip-ok{background:#d1fae5;color:#047857}
#tourRoot[data-theme="light"] .chip-warn{background:#fef3c7;color:#b45309}
#tourRoot[data-theme="light"] .chip-bad{background:#fee2e2;color:#b91c1c}
#tourRoot[data-theme="light"] .chip-info{background:#e0e7ff;color:#4338ca}
#tourRoot[data-theme="light"] .chip-neutral{background:#eef2f7;color:#475569}
.kvc{display:flex;flex-wrap:wrap;gap:8px}
.kv{background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--tx)}
#tourRoot[data-theme="light"] .kv{background:#f8fafc}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.mini{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:16px}
.mini .mi{font-size:21px}
.mini .mt{margin-top:8px;font-weight:600;color:var(--tx);font-size:14px}
.mini .md{margin-top:4px;font-size:12.5px;color:var(--mut);line-height:1.5}
.chat{display:flex;flex-direction:column;gap:12px}
.msg{max-width:78%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.55}
.msg.u{align-self:flex-end;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.msg.b{align-self:flex-start;background:var(--panel);border:1px solid var(--bd);color:var(--tx)}
.elig{margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.auditrow{border-top:1px solid var(--bd);padding:12px 0}
.auditrow:first-child{border-top:none;padding-top:0}
.player{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;z-index:8;width:min(580px,92%);background:rgba(15,23,42,.93);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:13px;box-shadow:0 14px 34px rgba(0,0,0,.45)}
.pbtn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:14px;flex:none}
.pinfo{flex:1;min-width:0;color:#fff}
.pstep{font-size:10px;letter-spacing:.06em;color:#a5b4fc;text-transform:uppercase}
.ptitle{font-size:13px;font-weight:700;margin-top:2px}
.psub{font-size:11px;color:#cbd5e1;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pprog{margin-top:7px;height:3px;border-radius:999px;background:rgba(255,255,255,.16);overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s ease}
.pnav{display:flex;gap:6px;flex:none}
.pnav button{height:32px;min-width:32px;padding:0 8px;border-radius:8px;border:1px solid rgba(255,255,255,.16);background:transparent;color:#fff;cursor:pointer;font-size:13px}
@media(max-width:720px){.side{display:none}}
</style>
</head>

<div id="tourRoot">

    <div class="frametop">
      <div class="dots"><i class="d1"></i><i class="d2"></i><i class="d3"></i></div>
      <div class="url">campus-ai.app/dashboard</div>

    <div class="app">

      <div class="main">

            <span class="av" id="av">RS</span>
          </div>
        </div>
        <div class="screen" id="screen"></div>
      </div>
    </div>
    <div class="player">
      <button class="pbtn" id="pbtn" onclick="togglePlay()">⏸</button>
      <div class="pinfo">
        <div class="pstep" id="pstep"></div>
        <div class="ptitle" id="ptitle"></div>
        <div class="psub" id="psub"></div>
        <div class="pprog"><div class="pfill" id="pfill"></div></div>

      </div>
    </div>
  </div>
</div>

<script>
function kpis(a){return '<div class="kpis">'+a.map(function(x){return '<div class="stat2"><div class="v '+x[2]+'">'+x[0]+'</div><div class="l">'+x[1]+'</div></div>';}).join('')+'</div>';}
function panel(t,inner){return '<div class="panel"><div class="pt">'+t+'</div>'+inner+'</div>';}
function table(h,rows){return '<table class="tbl"><thead><tr>'+h.map(function(x){return '<th>'+x+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';}
function chip(t,k){return '<span class="chip chip-'+k+'">'+t+'</span>';}
function kvc(a){return '<div class="kvc">'+a.map(function(x){return '<span class="kv">'+x+'</span>';}).join('')+'</div>';}
function list(a){return '<ul style="margin:0;padding-left:18px;color:var(--tx);font-size:13.5px;line-height:1.8">'+a.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';}
function cards3(a){return '<div class="grid3">'+a.map(function(x){return '<div class="mini"><div class="mi">'+x[0]+'</div><div class="mt">'+x[1]+'</div><div class="md">'+x[2]+'</div></div>';}).join('')+'</div>';}
function chat(a){return '<div class="chat">'+a.map(function(x){return '<div class="msg '+(x[0]==="u"?"u":"b")+'">'+x[1]+'</div>';}).join('')+'</div>';}
function audit(a){return a.map(function(x){return '<div class="auditrow">'+chip(x[0],x[1])+' <span class="muted" style="font-size:12px">'+x[2]+'</span><div style="margin-top:5px;font-size:13.5px;color:var(--tx)">'+x[3]+'</div><div style="margin-top:3px;font-size:12px;color:var(--mut)">'+x[4]+'</div></div>';}).join('');}
</script>

var PLAYLIST=[],cur=0,playing=true,timer=null,CURSCOPE="full";
function buildPlaylist(scope){var out=[];var rs=(scope==="full")?["student","teacher","tpo","recruiter","admin"]:[scope];rs.forEach(function(r){ROLES[r].order.forEach(function(k){out.push({role:r,key:k});});});return out;}
function render(){
  var e=PLAYLIST[cur];var role=ROLES[e.role];var sc=role.screens[e.key];
  var nav=role.nav.map(function(it){var k=it[0],label=it[1],icon=it[2];var on=(k===e.key)?" on":"";var has=!!role.screens[k];return '<div class="sitem'+on+'" data-r="'+e.role+'" data-k="'+k+'"'+(has?'':' data-x="1"')+'><span class="em">'+icon+'</span>'+label+'</div>';}).join('');
  var side=document.getElementById("side");
  side.innerHTML='<div class="sbrand"><span class="logo" style="width:26px;height:26px;font-size:13px">C</span>Campus AI</div><div class="snav">'+nav+'</div><div class="suser"><b style="color:var(--tx)">'+role.name+'</b><br>'+role.sub+'</div>';
  side.querySelectorAll(".sitem").forEach(function(el){if(!el.getAttribute("data-x")){el.onclick=function(){jump(el.getAttribute("data-r"),el.getAttribute("data-k"));};}});
  document.getElementById("apptitle").textContent=role.dash;
  document.getElementById("selrole").value=e.role;
  document.getElementById("rolepill").textContent=role.pill;
  document.getElementById("av").textContent=role.initials;
  var scr=document.getElementById("screen");
  scr.innerHTML='<div class="fade"><div class="sh">'+sc.t+'</div><div class="ssub">'+sc.s+'</div>'+sc.b+'</div>';
  scr.scrollTop=0;
  document.getElementById("pstep").textContent="Step "+(cur+1)+" / "+PLAYLIST.length+" · "+role.pill;
  document.getElementById("ptitle").textContent=sc.t;
  document.getElementById("psub").textContent=sc.s;
  document.getElementById("pfill").style.width=((cur+1)/PLAYLIST.length*100)+"%";
}
function schedule(){clearTimeout(timer);if(!playing)return;timer=setTimeout(function(){cur=(cur+1)%PLAYLIST.length;render();schedule();},4600);}
function togglePlay(){playing=!playing;document.getElementById("pbtn").textContent=playing?"⏸":"▶";schedule();}
function next2(){cur=(cur+1)%PLAYLIST.length;render();schedule();}
function prev(){cur=(cur-1+PLAYLIST.length)%PLAYLIST.length;render();schedule();}
function jump(r,k){var i=-1;for(var j=0;j<PLAYLIST.length;j++){if(PLAYLIST[j].role===r&&PLAYLIST[j].key===k){i=j;break;}}if(i>=0){cur=i;render();schedule();}}
function switchRole(r){CURSCOPE=r;PLAYLIST=buildPlaylist(r);cur=0;render();schedule();}
function toggleTheme(){var r=document.getElementById("tourRoot");if(r.getAttribute("data-theme")==="light"){r.removeAttribute("data-theme");document.getElementById("tbtn").textContent="☀";}else{r.setAttribute("data-theme","light");document.getElementById("tbtn").textContent="🌙";}}
function getParam(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):null;}
(function(){
  var scope=(getParam("tour")||getParam("role")||"full").toLowerCase();
  if(!ROLES[scope]&&scope!=="full")scope="full";
  if(getParam("theme")==="light")toggleTheme();
  CURSCOPE=scope;PLAYLIST=buildPlaylist(scope);cur=0;playing=true;render();schedule();
})();
</script>
